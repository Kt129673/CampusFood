# ===========================
# CampusFood Android - Build Pipeline
# ===========================
# Triggers on push to main branch (app changes only)
# Builds debug APK → Uploads as artifact

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
  workflow_dispatch: # Allow manual trigger

env:
  JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare Debug Keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          # Also copy to .config/.android where Gradle is looking
          mkdir -p ~/.config/.android
          cp ~/.android/debug.keystore ~/.config/.android/debug.keystore

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
        continue-on-error: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: campusfood-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Release APK (signed with debug key)
        if: success()
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: campusfood-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Get APK info and SHA-1
        if: success()
        run: |
          # Find the APKs
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          echo "Debug APK found at: $DEBUG_APK"
          echo "Release APK found at: $RELEASE_APK"
          
          # Set env variables for summary
          if [ -n "$DEBUG_APK" ]; then
            echo "DEBUG_SIZE=$(du -h "$DEBUG_APK" | cut -f1)" >> $GITHUB_ENV
          fi
          if [ -n "$RELEASE_APK" ]; then
            echo "RELEASE_SIZE=$(du -h "$RELEASE_APK" | cut -f1)" >> $GITHUB_ENV
          fi
          
          echo "------------------------------------------------------------"
          echo "SIGNING INFO FOR GOOGLE CLOUD CONSOLE"
          echo "------------------------------------------------------------"
          if [ -n "$RELEASE_APK" ]; then
            echo "RELEASE APK SHA-1 (Signed with Debug Key):"
            # Extract SHA1 using a more robust regex
            keytool -printcert -jarfile "$RELEASE_APK" | grep -Ei "SHA1|SHA-1" || (echo "Full keytool output for debugging:" && keytool -printcert -jarfile "$RELEASE_APK")
          else
            echo "Error: Release APK not found. Cannot extract SHA-1."
            exit 1
          fi
          echo "------------------------------------------------------------"

      - name: Build Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Android APK built successfully!"
            echo "📱 Debug APK: ${{ env.DEBUG_SIZE }}"
            echo "📱 Release APK: ${{ env.RELEASE_SIZE }}"
            echo "🔗 Download artifacts from the Actions tab"
          else
            echo "❌ Build failed. Check logs above for details."
          fi
