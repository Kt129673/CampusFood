# ===========================
# CampusFood Android - Build Pipeline
# ===========================
# Triggers on push to main branch (app changes only)
# Builds debug APK → Uploads as artifact

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
  workflow_dispatch: # Allow manual trigger

env:
  JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
        continue-on-error: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: campusfood-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Release APK (unsigned)
        if: success()
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: campusfood-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Get APK info
        if: success()
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "DEBUG_SIZE=$(du -h "$DEBUG_APK" | cut -f1)" >> $GITHUB_ENV
          echo "RELEASE_SIZE=$(du -h "$RELEASE_APK" | cut -f1)" >> $GITHUB_ENV

      - name: Build Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Android APK built successfully!"
            echo "📱 Debug APK: ${{ env.DEBUG_SIZE }}"
            echo "📱 Release APK: ${{ env.RELEASE_SIZE }}"
            echo "🔗 Download artifacts from the Actions tab"
          else
            echo "❌ Build failed. Check logs above for details."
          fi
