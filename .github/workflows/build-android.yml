# ===========================
# CampusFood Android - Build Pipeline
# ===========================
# Triggers on push to main branch (app changes only)
# Builds debug APK → Uploads as artifact

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: campusfood-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: campusfood-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "✅ Android APK built successfully!"
          echo "📱 Debug APK: app/build/outputs/apk/debug/"
          echo "📱 Release APK: app/build/outputs/apk/release/"
