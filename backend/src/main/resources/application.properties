spring.datasource.url=jdbc:mysql://examportal.c5ikc8wo4uh5.eu-north-1.rds.amazonaws.com:3306/campusfood?useSSL=true&requireSSL=true&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
