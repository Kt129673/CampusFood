# ===========================
# CampusFood Backend Configuration
# ===========================

# Server
server.port=5000
spring.profiles.active=dev

# ===========================
# Database Configuration (MySQL - AWS RDS)
# ===========================
spring.datasource.url=jdbc:mysql://examportal.c5ikc8wo4uh5.eu-north-1.rds.amazonaws.com:3306/campusfood?useSSL=true&requireSSL=true&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=r7XgJHvKUzG9XqWW2rkN
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Performance Optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.default_batch_fetch_size=10

# Second-level cache (optional - uncomment if using Ehcache or similar)
# spring.jpa.properties.hibernate.cache.use_second_level_cache=true
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# ===========================
# Connection Pool (HikariCP)
# ===========================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ===========================
# Jackson (JSON)
# ===========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=non_null

# ===========================
# Spring Boot Actuator & DevTools
# ===========================
management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoint.health.show-details=always
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.livereload.enabled=true

# ===========================
# Logging (Optimized for Production)
# ===========================
logging.level.com.campusfood=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ===========================
# AWS S3 Configuration
# ===========================
aws.accessKey=${AWS_ACCESS_KEY:AKIA_DUMMY_KEY_FOR_LOCAL_DEV}
aws.secretKey=${AWS_SECRET_KEY:DUMMY_SECRET_KEY_FOR_LOCAL_DEV}
aws.region=ap-south-1
aws.bucketName=campusfood

# ===========================
# Server Compression (Performance)
# ===========================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# ===========================
# File Upload Configuration
# ===========================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# ===========================
# Thread Pool Configuration
# ===========================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# ===========================
# HTTP/2 Support
# ===========================
server.http2.enabled=true
