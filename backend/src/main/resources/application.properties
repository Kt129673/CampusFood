# ===========================
# CampusFood Backend Configuration
# ===========================

# Server
server.port=5000
spring.profiles.active=dev

# ===========================
# Database Configuration (MySQL - AWS RDS)
# ===========================
spring.datasource.url=jdbc:mysql://examportal.c5ikc8wo4uh5.eu-north-1.rds.amazonaws.com:3306/campusfood?useSSL=true&requireSSL=true&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
spring.datasource.username=root
spring.datasource.password=r7XgJHvKUzG9XqWW2rkN
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# Connection Pool (HikariCP)
# ===========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===========================
# Jackson (JSON)
# ===========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ===========================
# Logging
# ===========================
logging.level.com.campusfood=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================
# AWS S3 Configuration
# ===========================
aws.accessKey=${AWS_ACCESS_KEY:}
aws.secretKey=${AWS_SECRET_KEY:}
aws.region=ap-south-1
aws.bucketName=campusfood

# ===========================
# Server Compression (Performance)
# ===========================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# ===========================
# File Upload Configuration
# ===========================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

