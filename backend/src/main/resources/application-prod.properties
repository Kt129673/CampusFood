# Production Specific Settings
# Use port 5000 for AWS Elastic Beanstalk
server.port=5000

# Disable DevTools in Production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Production Logging Levels
logging.level.com.campusfood=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Disable SQL Logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production Actuator Settings
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true

# Production Connection Pool (Optimized for AWS RDS)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# Production Thread Pool
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# Production Cache Settings (Larger cache for production)
# Note: These would be read by CacheConfig if we make it configurable
# For now, they're documented here for future enhancement

# Security Headers
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Compression (Already enabled in main properties)
server.compression.enabled=true
server.compression.min-response-size=1024

# HTTP/2
server.http2.enabled=true

# Production JPA Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
